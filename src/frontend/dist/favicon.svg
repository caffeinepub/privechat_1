  <!-- Lock shackle (arch) above lock body -->
  <path d="M21 22 L21 18 Q21 15 24 15 Q27 15 27 18 L27 22" fill="none" stroke="#7C3AED" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Keyhole dot -->
