<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6D28D9"/>
      <stop offset="100%" stop-color="#C026D3"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#00000040"/>
    </filter>
  </defs>
  <!-- Rounded square background -->
  <rect width="180" height="180" rx="36" ry="36" fill="url(#bg)" filter="url(#shadow)"/>
  <!-- Speech bubble body -->
  <path d="M28 34 Q28 22 40 22 L140 22 Q152 22 152 34 L152 114 Q152 126 140 126 L68 126 L40 150 L40 126 Q28 126 28 114 Z" fill="white"/>
  <!-- Lock body centered in bubble -->
  <rect x="70" y="84" width="40" height="30" rx="7" ry="7" fill="#7C3AED"/>
  <!-- Lock shackle -->
  <path d="M78 84 L78 68 Q78 56 90 56 Q102 56 102 68 L102 84" fill="none" stroke="#7C3AED" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Keyhole dot -->
  <circle cx="90" cy="100" r="6" fill="white"/>
  <!-- Keyhole slot -->
  <rect x="87" y="100" width="6" height="8" rx="2" fill="white"/>
</svg>
